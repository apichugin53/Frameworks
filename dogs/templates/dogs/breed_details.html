{% extends 'layout.html' %}
{% load i18n %}
{% block content %}
    <div class="mt-3">
        <h3>{{ object.name }}</h3>
        <p>{{ object.description }}</p>
        <form action="{% url 'dogs:dogs_list' %}">
            <button class="btn btn-outline-success" type="submit" name="breed" value="{{ object.name }}">
                {% translate 'Search' %}
            </button>
        </form>
    </div>
{% endblock %}
