{% load static %}
{% load i18n %}
{% load dogs.tags %}

<div class="d-flex flex-column shadow rounded dog-card">
    <img class="dog-photo object-fit-cover rounded-top" src="{% media dog.photo %}"
         alt="{{ dog.name }}">
    <div class="p-2">
        <div class="d-flex">
            <strong>{{ dog.name }}</strong>
            {% include 'dogs/include/dog_views_counter.html' with dog=dog %}
        </div>
        <div class="d-flex mt-2">
            <a href="{% url 'dogs:dog_details' dog.id %}" class="btn btn-sm btn-outline-primary ms-auto">
                {% translate 'Details' %}
            </a>
        </div>
    </div>
</div>
