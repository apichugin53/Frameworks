{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{% static 'css/bootstrap.min.css' %}">
    <link rel="stylesheet" href="{% static 'dogs/css/main.css' %}">
    <link rel="icon" type="image/png" href="{% static 'img/favicon.ico' %}">
    <script src="{% static 'js/bootstrap.bundle.min.js' %}" defer></script>
    <title>{{ title }}</title>
</head>
<body>
<header>
    <nav class="navbar navbar-expand-sm navbar-dark bg-dark">
        <div class="container-fluid container">
            <a class="navbar-brand" href="{% url 'dogs:home' %}">
                <img src="{% static 'img/logo.svg' %}" alt="logo nav-link" class="logo">
            </a>
            <ul class="navbar-nav me-auto">
                <li class="nav-item">
                    <a href="{% url 'dogs:dogs_list' %}" class="nav-link">Собаки</a>
                </li>
                <li class="nav-item">
                    <a href="{% url 'dogs:breeds_list' %}" class="nav-link">Породы</a>
                </li>
            </ul>

            {% if user.is_authenticated %}
                <div class="btn-group me-0" role="group">
                    <span class="text-bg-dark align-content-center mx-1">{{ user.username }}</span>
                    <button type="button" class="btn btn-outline-dark dropdown-toggle" data-bs-toggle="dropdown"
                            aria-haspopup="true" aria-expanded="false" style="color:forestgreen; min-width: auto">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor"
                             class="bi bi-person-circle" viewBox="0 0 16 16">
                            <path d="M11 6a3 3 0 1 1-6 0 3 3 0 0 1 6 0"/>
                            <path fill-rule="evenodd"
                                  d="M0 8a8 8 0 1 1 16 0A8 8 0 0 1 0 8m8-7a7 7 0 0 0-5.468 11.37C3.242 11.226 4.805 10 8 10s4.757 1.225 5.468 2.37A7 7 0 0 0 8 1"/>
                        </svg>
                    </button>
                    <ul class="dropdown-menu dropdown-menu-end dropdown-menu-dark">
                        <li>
                            <a href="{% url 'users:profile' %}" class="dropdown-item">Профиль</a>
                            <a href="{% url 'users:logout' %}" class="dropdown-item">Выход</a>
                        </li>
                    </ul>
                </div>
            {% else %}
                <div class="me-0" role="group">
                    <a href="{% url 'users:signin' %}" class="btn btn-dark">Вход</a>
                    <a href="{% url 'users:signup' %}" class="btn btn-dark">Регистрация</a>
                </div>
            {% endif %}
        </div>
    </nav>
</header>
<main class="container">
    {% block content %}
    {% endblock %}
</main>
</body>
</html>
