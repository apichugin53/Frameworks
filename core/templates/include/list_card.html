{% load i18n %}

<div class="d-flex shadowed rounded list_card">
    <img class="avatar col" src="{{ image_url }}" alt="avatar">
    <div class="d-flex flex-column col m-2">
        <div class="fw-bold">{{ caption }}</div>
        <div>{{ details }}</div>
        <div class="d-flex h-100">
            <a href="{{ details_url }}" class="btn btn-sm btn-outline-primary ms-auto mt-auto">
                {% translate 'Details' %}
            </a>
        </div>
    </div>
</div>
