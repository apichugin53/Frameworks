{% extends 'layout.html' %}
{% load i18n %}
{% load static %}
{% block css %}
    <link rel="stylesheet" href="{% static 'security/css/style.css' %}">
{% endblock %}
{% block content %}
    <div class="mt-5 mx-auto auth-form">
        <div class="card border-success w-100">
            <div class="card-header text-center">{% translate 'Sign in' %}</div>
            <div class="card-body">
                <form id="signin-form" action="" method="post">
                    {% csrf_token %}
                    {{ form }}
                    <small class="mt-1">
                        <a href="{% url 'auth:password_reset' %}">{% translate 'Forgot password?' %}</a>
                    </small>
                    <button type="submit" class="btn btn-outline-success mt-3 w-100">
                        {% translate 'Sign in' %}
                    </button>
                    <div class="d-flex flex-column mt-2">
                        <hr class="my-2">
                        <small class="d-flex mx-auto">
                            <span class="me-1">{% translate 'No account?' %}</span>
                            <a href="{% url 'auth:signin' %}">{% translate 'Sign up' %}</a>
                        </small>
                    </div>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
