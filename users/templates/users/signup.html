{% extends 'core/layout.html' %}
{% block content %}
    <div class="mt-5 mx-auto form-max-w">
        <div class="card border-success w-100 form-min-w">
            <div class="card-header text-bg-secondary">{{ title }}</div>
            <div class="card-body">
                <form action="{% url 'users:signup' %}" method="post">
                    {% csrf_token %}
                    {{ form }}
                    <button type="submit" class="btn btn-outline-success mt-3 w-100">{{ title }}</button>
                </form>
            </div>
        </div>
    </div>
{% endblock %}
